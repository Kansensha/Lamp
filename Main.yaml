    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇸🇬
    include-all: true
    filter: (?i)🇸🇬|新|坡|新加坡|狮城|SG|SGP|Singapore
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇯🇵
    include-all: true
    filter: (?i)🇯🇵|日|JP|JPN|Japan
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇰🇷
    include-all: true
    filter: (?i)🇰🇷|韩|韓|KOR|Korea
    type: url-test
    interval: 300
    tolerance: 50
