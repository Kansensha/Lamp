      - 🚧 Temp
      - DIRECT
      - REJECT
  - name: ☁️ OneDrive
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
  - name: 🌆 Microsoft
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
