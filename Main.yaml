##### ---------------------------------------------------------------------------------------------------- #####
##### BEGIN #####
allow-lan: true # 允许局域网连接
bind-address: "*" # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址
mode: rule
log-level: warning # 日志等级 silent/error/warning/info/debug
ipv6: false # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录
profile:
  store-selected: true # 储存 API 对策略组的选择，以供下次启动时使用
  store-fake-ip: false # 储存 fakeip 映射表，域名再次发生连接时，使用原有映射地址
unified-delay: true # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
tcp-concurrent: true # 启用 TCP 并发连接，将会使用 dns 解析出的所有 IP 地址进行连接，使用第一个成功的连接
##### END #####
##### ---------------------------------------------------------------------------------------------------- #####
##### BEGIN geox-url #####
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
geo-auto-update: true
geo-update-interval: 24
##### END geox-url #####
##### ---------------------------------------------------------------------------------------------------- #####
##### BEGIN proxy-groups #####
proxy-groups:
  ### BEGIN DEFAULT ###
  - name: 🔑 Default
    include-all: true
    type: select
    proxies:
      - 🇺🇸
      - 🇭🇰
      - 🇨🇳
      - 🇸🇬
      - 🇯🇵
      - 🇰🇷
      - DIRECT
      - REJECT
  - name: 💡 Point
    include-all: true
    type: select
    proxies:
      - 🧬 Proxy
      - 🇺🇸
      - 🇭🇰
      - 🇨🇳
      - 🇸🇬
      - 🇯🇵
      - 🇰🇷
      - DIRECT
      - REJECT
  - name: 💫 Special
    include-all: true
    type: select
    proxies:
      - 🧬 Proxy
      - 🇺🇸
      - 🇭🇰
      - 🇨🇳
      - 🇸🇬
      - 🇯🇵
      - 🇰🇷
      - DIRECT
      - REJECT
  - name: 🚧 Temp
    include-all: true
    type: select
    proxies:
      - 🧬 Proxy
      - 🇺🇸
      - 🇭🇰
      - 🇨🇳
      - 🇸🇬
      - 🇯🇵
      - 🇰🇷
      - DIRECT
      - REJECT
  - name: 💿 Media
    include-all: true
    type: select
    proxies:
      - 🧬 Proxy
      - 🇺🇸
      - 🇭🇰
      - 🇨🇳
      - 🇸🇬
      - 🇯🇵
      - 🇰🇷
      - DIRECT
      - REJECT
  - name: 🧬 Proxy
    type: select
    proxies:
      - 🔑 Default
      - DIRECT
      - ♻️ Url-Test
      - 🔯 Fallback
      - 🔮 Load-Balance
      - REJECT
  - name: 💠 Direct
    type: select
    proxies:
      - DIRECT
      - REJECT
      - 🧬 Proxy
  - name: ⛔ Ban
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🧬 Proxy
  - name: ⭕ Unban
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - REJECT
  - name: 🐟 Final
    type: select
    proxies:
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - DIRECT
      - REJECT
  ### END DEFAULT ###

  ### BEGIN TEST ###
  - name: ♻️ Url-Test
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
  - name: 🔯 Fallback
    type: fallback
    include-all: true
    interval: 300
    tolerance: 50
  - name: 🔮 Load-Balance
    type: load-balance
    include-all: true
    interval: 300
    tolerance: 50
  ### END TEST ###

  ### BEGIN MINE ###
  - name: 💪 ForceD
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
  - name: 💪 ForceP
    type: select
    proxies:
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - DIRECT
      - REJECT
  ### END MINE ###

  ### BEGIN MINE OTHER ###
  - name: 🧲 BTD
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
  - name: 🧲 BTP
    type: select
    proxies:
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - DIRECT
      - REJECT
  - name: ☁️ PikPakD
    type: select
    proxies:
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - REJECT
  - name: ☁️ PikPakP
    type: select
    proxies:
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - DIRECT
      - REJECT
  ### END MINE OTHER ###

  ### BEGIN SERVICE ###
  - name: 💬 AI
    type: select
    proxies:
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
      - DIRECT
      - REJECT
  - name: 📹 Youtube
