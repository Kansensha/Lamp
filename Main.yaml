      - DIRECT
      - REJECT
  ### END GAME ###

  ### BEGIN MEDIA ###
  - name: 📺 BilibiliHMT
    type: select
    proxies:
      - DIRECT
      - 🇭🇰
      - 🇨🇳
      - REJECT
  - name: 🎥 Media
    type: select
    proxies:
      - 💿 Media
      - DIRECT
      - REJECT
  ### END MEDIA ###

  ### BEGIN ADBLOCK ###
  - name: 🛑 AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT
      - 🧬 Proxy
      - 💡 Point
      - 💫 Special
      - 🚧 Temp
  ### END ADBLOCK ###

  ### BEGIN COUNTRY ###
  - name: 🇺🇸
    include-all: true
    filter: (?i)🇺🇸|美|US|USA|United.*States
    type: url-test
    interval: 300
    tolerance: 50
  - name: 🇭🇰
    include-all: true
